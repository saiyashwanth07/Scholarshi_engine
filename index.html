<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Engine</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 40px;
        }
        h1 {
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        .results {
            margin-top: 20px;
        }
        .card {
            background: #e9f3ff;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>🎓 Scholarship Finder</h1>

<div class="container">
    <label>JEE Percentile</label>
    <input type="number" id="jee">

    <label>Board Percentage</label>
    <input type="number" id="board">

    <button onclick="findScholarships()">Find Scholarships</button>

    <div class="results" id="results"></div>
</div>

<script>
async function findScholarships() {
    const jee = document.getElementById("jee").value;
    const board = document.getElementById("board").value;

    const response = await fetch("http://127.0.0.1:8000/evaluate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            jee_percentile: jee ? Number(jee) : null,
            board_percentage: board ? Number(board) : null
        })
    });

    const data = await response.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (!data.results || data.results.length === 0) {
        resultsDiv.innerHTML = "<p>No scholarships found</p>";
        return;
    }

    data.results.slice(0, 10).forEach(college => {
        resultsDiv.innerHTML += `
            <div class="card">
                <strong>${college.college_name}</strong><br>
                📍 ${college.location}<br>
                🎯 ${college.percent}% 
                ${college.flat > 0 ? `+ ₹${college.flat}` : ""}
            </div>
        `;
    });
}
</script>

</body>
</html>
