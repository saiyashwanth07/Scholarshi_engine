<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Finder</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            color: black;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #2a5298;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .results {
            margin-top: 20px;
        }

        .card {
            background: #f1f6ff;
            padding: 15px;
            margin-top: 12px;
            border-radius: 10px;
            border-left: 5px solid #2a5298;
        }

        .top {
            border-left: 5px solid #28a745;
            background: #e8fff1;
        }

        .tag {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🎓 Scholarship Finder</h1>

<div class="container">

    <label>JEE Percentile</label>
    <input type="number" id="jee" placeholder="Enter percentile">

    <label>Board Percentage</label>
    <input type="number" id="board" placeholder="Enter percentage">

    <button onclick="findScholarships()">Find Scholarships</button>

    <div class="results" id="results"></div>

</div>

<script>
async function findScholarships() {
    const jee = document.getElementById("jee").value;
    const board = document.getElementById("board").value;

    const response = await fetch("https://scholarshi-engine.onrender.com/evaluate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            jee_percentile: jee ? Number(jee) : null,
            board_percentage: board ? Number(board) : null
        })
    });

    const data = await response.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (!data.results || data.results.length === 0) {
        resultsDiv.innerHTML = "<p>No scholarships found</p>";
        return;
    }

    data.results.slice(0, 10).forEach((college, index) => {
    const isTop = index === 0;

    resultsDiv.innerHTML += `
        <div class="card ${isTop ? 'top' : ''}">
            ${isTop ? '<div class="tag">🔥 Best Match</div>' : ''}
            <strong>${college.college_name}</strong><br>
            📍 ${college.location}<br>
            🎓 ${college.course}<br><br>
            💰 Original Fee: ₹${college.original_fee.toLocaleString()}<br>
            🎯 Scholarship: ${college.scholarship_percent}%<br>
            💸 Final Fee: ₹${college.final_fee.toLocaleString()}
        </div>
    `;
});
}
</script>

</body>
</html>
